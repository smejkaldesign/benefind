    <circle cx="807.0" cy="220.9" r="332.8" fill="url(#blob1)" opacity="0.28"/>
    <circle cx="707.2" cy="166.8" r="344.5" fill="url(#blob2)" opacity="0.15"/>
    <circle cx="33.8" cy="76.2" r="279.4" fill="url(#blob0)" opacity="0.19"/>
    <circle cx="1279.6" cy="32.2" r="353.5" fill="url(#blob1)" opacity="0.31"/>
