<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810" role="img">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131018"/>
      <stop offset="100%" stop-color="#241c2a"/>
    </linearGradient>
    <radialGradient id="blob0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c8f5" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#e8c8f5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8c8f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b8e5" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#f0b8e5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0b8e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#deb0f7" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#deb0f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#deb0f7" stop-opacity="0"/>
    </radialGradient>
